services:
  - type: web
    name: recovery-detector
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn product.api.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: NEWS_API_KEY
        sync: false
      # Supabase (Phase 1). Set these in the Render dashboard. Not yet read by any
      # endpoint — auth gating lands in Phase 2. SUPABASE_JWT_SECRET is backend-only.
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_JWT_SECRET
        sync: false

  # The daily scheduled run has moved to GitHub Actions (free tier) —
  # see .github/workflows/daily-screener.yml. Only the web service runs on Render.

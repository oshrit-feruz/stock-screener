services:
  - type: web
    name: recovery-detector
    runtime: python
    # Seed the runtime cache from the committed prebuilt cache so the Simulator's
    # first request is already warm (true Top-100 universe, no cold-fetch timeout).
    buildCommand: pip install -r requirements.txt && python scripts/seed_cache.py
    startCommand: uvicorn product.api.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: NEWS_API_KEY
        sync: false
      # Price data source (EODHD). Required: PriceData.get_prices reads this at
      # runtime; without it every fetch returns empty and backtests fail with
      # "No price data found". Set the value in the Render dashboard (sync:false
      # keeps the secret out of the repo).
      - key: EODHD_API_KEY
        sync: false

  # The daily scheduled run has moved to GitHub Actions (free tier) —
  # see .github/workflows/daily-screener.yml. Only the web service runs on Render.
